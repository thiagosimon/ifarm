name: ifarm-prod

networks:
  ifarm-net:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  rabbitmq_data:
  redis_data:
  keycloak_data:

services:

  # ─────────────────────────────────────────────
  # REVERSE PROXY
  # ─────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - ifarm-net
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3


  # ─────────────────────────────────────────────
  # DATABASES
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ../../infra/mongodb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ifarm-net
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ifarm
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ifarm-net
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ifarm-net
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ifarm
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ifarm-net
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # IDENTITY PROVIDER
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start --db postgres --health-enabled=true --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ../../infra/keycloak/realm-ifarm.json:/opt/keycloak/data/import/realm.json:ro
    networks:
      - ifarm-net
    mem_limit: 768m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\r\n\r\n' >&3 && timeout 3 cat <&3 | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOSTNAME}`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # ─────────────────────────────────────────────
  # MICROSERVICES — ENTRY POINT
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    image: ifarm/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/ifarm
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/ifarm/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      IDENTITY_SERVICE_URL: http://identity-service:3001
      AUTH_SERVICE_URL: http://auth-service:3002
      CATALOG_SERVICE_URL: http://catalog-service:3003
      QUOTATION_SERVICE_URL: http://quotation-service:3004
      ORDER_SERVICE_URL: http://order-service:3006
      PAYMENT_SERVICE_URL: http://payment-service:3007
      NOTIFICATION_SERVICE_URL: http://notification-service:3010
      REVIEW_SERVICE_URL: http://review-service:3011
    networks:
      - ifarm-net
    mem_limit: 300m
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.ifarm.agr.br`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  # ─────────────────────────────────────────────
  # MICROSERVICES — DOWNSTREAM
  # ─────────────────────────────────────────────
  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    image: ifarm/identity-service:latest
    container_name: identity-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      LOG_LEVEL: info
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_identity?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      ENCRYPTION_KEY: ${IDENTITY_ENCRYPTION_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET_IDENTITY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SERPRO_BASE_URL: ${SERPRO_BASE_URL}
      SERPRO_CLIENT_ID: ${SERPRO_CLIENT_ID}
      SERPRO_CLIENT_SECRET: ${SERPRO_CLIENT_SECRET}
      SERPRO_TOKEN_URL: ${SERPRO_TOKEN_URL}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    image: ifarm/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3002"
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: ifarm
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  catalog-service:
    build:
      context: ../../services/catalog-service
      dockerfile: Dockerfile
    image: ifarm/catalog-service:latest
    container_name: catalog-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3003"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_catalog?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  quotation-service:
    build:
      context: ../../services/quotation-service
      dockerfile: Dockerfile
    image: ifarm/quotation-service:latest
    container_name: quotation-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3004"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_quotations?authSource=admin
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_quotations?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  matching-service:
    build:
      context: ../../services/matching-service
      dockerfile: Dockerfile
    image: ifarm/matching-service:latest
    container_name: matching-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3005"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_matching?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  order-service:
    build:
      context: ../../services/order-service
      dockerfile: Dockerfile
    image: ifarm/order-service:latest
    container_name: order-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3006"
      TYPEORM_SYNCHRONIZE: "true"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_orders?authSource=admin
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ifarm_orders
      POSTGRES_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ifarm_orders
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  payment-service:
    build:
      context: ../../services/payment-service
      dockerfile: Dockerfile
    image: ifarm/payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3007"
      TYPEORM_SYNCHRONIZE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ifarm_payments
      POSTGRES_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ifarm_payments
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      PAGARME_API_KEY: ${PAGARME_API_KEY}
      PAGARME_WEBHOOK_SECRET: ${PAGARME_WEBHOOK_SECRET}
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  commission-service:
    build:
      context: ../../services/commission-service
      dockerfile: Dockerfile
    image: ifarm/commission-service:latest
    container_name: commission-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3008"
      TYPEORM_SYNCHRONIZE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ifarm_commissions
      POSTGRES_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ifarm_commissions
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  tax-service:
    build:
      context: ../../services/tax-service
      dockerfile: Dockerfile
    image: ifarm/tax-service:latest
    container_name: tax-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3009"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_tax?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3009/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    image: ifarm/notification-service:latest
    container_name: notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3010"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_notifications?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID}
      ONESIGNAL_API_KEY: ${ONESIGNAL_API_KEY}
      META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID}
      AWS_SES_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  review-service:
    build:
      context: ../../services/review-service
      dockerfile: Dockerfile
    image: ifarm/review-service:latest
    container_name: review-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3011"
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/ifarm_reviews?authSource=admin
      RABBITMQ_URI: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/ifarm
    networks:
      - ifarm-net
    mem_limit: 256m
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
